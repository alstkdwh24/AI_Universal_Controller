<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Content Security Policy: recommended for Electron security -->
    <!-- default-src 'self' 기본적으로 현재 도메인만 허용 connect-src 서버 통신 허용 script-src 자바스크립트 허용 style-src css허용 font-src 폰트 로드 허용 ima-src 이미지 로드 허용 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self';
               connect-src 'self' http://localhost:8086 http://localhost:8082;
               script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.jsdelivr.net/npm/sweetalert2@11;
               style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.jsdelivr.net/npm/sweetalert2@11;
               font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.jsdelivr.net/npm/sweetalert2@11;
               img-src 'self' data:;">

    <title>JO-GPT PC Client</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add_circle,more_horiz" />
    <link rel="stylesheet" href="./css/index/GPT-Home.css">
    <link rel="stylesheet" href="./css/index/modelJoin.css">
    <link rel="stylesheet" href="./css/index/toastMessage.css">
    <link rel="stylesheet" href="./css/chatTing/chatTing.css">
    <link rel="stylesheet" href="./css/index/chattingHome.css">
    <link rel="stylesheet" href="./css/index/alertModal.css">
    <link rel="stylesheet" href="./css/index/menuBar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="./node_modules/jquery/dist/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

    <!-- 사이드바 부분 -->
    <div class="sideBar">
        <div class="sideBar-top">
            <button class="sideBarImg">
                <div class="sideButton"><i class="fa fa-bars same-font menuBar"></i>
                    <div class="sideBarText">메뉴</div>
                </div>
            </button>
            <button class="sideBarImg" id="homeBtn">
                <div class="sideButton"><i class="fa fa-plus same-font"></i>
                    <div class="sideBarText">홈</div>
                </div>
            </button>
            <button class="sideBarImg chatTing">
                <div class="sideButton"><i class="fa fa-comment same-font"></i>
                    <div class="sideBarText">채팅</div>
                </div>
            </button>

            <button class="sideBarImg">
                <div class="sideButton"><i class="bi bi-grid same-font"></i>
                    <div class="sideBarText">모델</div>
                </div>
            </button>

            <button class="sideBarImg">
                <div class="sideButton"><i class="fa fa-ellipsis-h same-font"></i>
                    <div class="sideBarText">더보기</div>
                </div>
            </button>
        </div>
        <!-- 하단 설정 아이콘 -->
        <div class="sideBar-bottom">
            <button class="sideBarImg sideBell">
                <i class="fa fa-bell" style="font-size: 24px; color: #555;"></i>
                <div class="sideBarText">알림</div>
            </button>
            <button class="sideBarImg">
                <i class="fa fa-cog" style="font-size: 24px; color: #555;"></i>
                <div class="sideBarText">설정</div>
            </button>
        </div>
    </div>

    <div class="content">
        <div class="topBar">
            <div class="topBar-left">
                <h2>JOGPT</h2>
            </div>
            <div class="topBar-middle"></div>
            <div class="topBar-right">
                <div id="authButtons" class="topBar-rightRight">
                    <button class="buttonWhite">로그인</button>
                    <button class="buttonBlack">회원가입</button>
                </div>
                <div id="userProfile" class="topBar-rightRight" style="display: none;">
                    <span id="userNameDisplay">사용자</span>님
                    <button id="logoutButton" class="buttonWhite" style="margin-left: 10px;">로그아웃</button>
                </div>
            </div>
        </div>

        <div class="realContent">
            <div class="my-gemini-talk">

            </div>
            <div class="realBox">
                <div class="realBoxFont">
                    안녕하세요 <span id="userName">사용자</span>님
                </div>

                <div class="input-wrapper">
                    <label>
                        <textarea class="fake-input" placeholder="어떤것이든 물어보세요" autofocus
                            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                    </label>

                    <div class="search-div">
                        <div class="left-tools">
                            <button class="search-btn">
                                <i class="fa fa-paperclip"></i>
                            </button>
                        </div>
                        <div class="search-result">
                            <select class="select-model">
                                <option>Gemini 3 Flash</option>

                                <option>GPT-4.5</option>
                            </select>

                            <button class="search-btn search-real">
                                <i class="fa fa-arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 모달 로그인/회원가입 -->
    <div class="modelLogin">
        <div class="modelJoin">
            <div class="modelJoinTitle">
                <h2 class="modelJoinTitleH2 fontFamily" id="fontFamily">로그인 또는 회원가입</h2>
                <p class="modelJoinTitleP fontFamily">소셜 로그인을 통해 쉽게 로그인하세요</p>
            </div>
            <div class="modelJoinSocial">
                <!--electron은 location.href가 막혀있다. 그래서 onclick="require('electron').shell.openExternal('http://localhost:8086/oauth2/authorization/kakao')" 이런식으로 해야한다.-->
                <div class="socialJoin-kakao" data-url="http://localhost:8086/oauth2/authorization/kakao">
                    <div class="socialJoins-round"><img src="./image/kakaoLogo.png" class="login-logo" alt="카카오로고">
                    </div>
                    <div class="socialJoins-name">카카오 로그인</div>
                </div>
                <div class="socialJoin-naver" data-url="http://localhost:8086/oauth2/authorization/naver">
                    <div class="socialJoins-round"><img src="./image/naver_login.png" alt="네이버 로그인" class="login-logo">
                    </div>
                    <div class="socialJoins-name">네이버 로그인</div>
                </div>
                <div class="socialJoin-google" data-url="http://localhost:8086/oauth2/authorization/google">
                    <div class="socialJoins-round"><img src="./image/google_login.png" alt="구글 로그인"
                            class="login-logo login-google"></div>
                    <div class="socialJoins-name">구글 로그인</div>
                </div>
                <div class="socialJoin-facebook" data-url="http://localhost:8086/oauth2/authorization/facebook">
                    <div class="socialJoins-round"><img src="./image/facebook_login.png" alt="페이스북 로그인"
                            class="login-logo">
                    </div>
                    <div class="socialJoins-name">페이스북 로그인</div>
                </div>
                <div class="socialJoin-github" data-url="http://localhost:8086/oauth2/authorization/github">
                    <div class="socialJoins-round"><img src="./image/GitHub_login.svg" alt="깃허브 로그인" class="login-logo">
                    </div>
                    <div class="socialJoins-name">깃허브 로그인</div>
                </div>
                <div class="socialJoin-self">
                    <div class="socialJoins-round"><img alt="JO-GPT_login" src="./image/JO-GPT_login.png"
                            class="login-logo"></div>
                    <div class="socialJoins-name">JO-GPT 회원가입</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 알림 모달창 만들기 -->
    <div id="tpl-toast-alert" class="tpl-toast-alert">
        <div class="toast-alert">
            <!-- 모달 헤더 -->
            <div class="toast-alert-header">
                <h1>알림</h1>
            </div>
            <!-- 모달 본문 -->
            <div class="toast-alert-body">
                <!-- 알림 내용 -->
                <div class="toast-alert-text"></div>
                <div class="toast-alert-text"></div>
            </div>
        </div>


        <!-- 화면에 렌더링되지 않음, JS에서 복제해서 사용 -->
        <template id="tpl-my-content">
            <div class="myContents">
                <div id="myContent-myContent">
                    <div id="realMyContent"></div>
                </div>
            </div>
        </template>

        <template id="tpl-gpt-content">
            <div class="gptContents">
                <div id="geminiContent-geminiContent">
                    <div id="realGeminiContent"></div>
                </div>
            </div>
        </template>

        <template id="tpl-loading">
            <div class="loading" id="start-loading">
                <div id="geminiContent-geminiContent">
                    <div class="loading-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </template>


        <script src="./js/config/config.js"></script>

        <!-- Scripts-->
        <script src="./js/home/GPT-model-button.js"></script>
        <script src="./js/home/textareaJs.js"></script>
        <script src="./js/home/gpt-home.js"></script>
        <script src="./js/chatTing/chatTing.js"></script>
        <script src="./js/chatTing/chatTingList.js"></script>
        <script src="./js/home/alert-modal.js"></script>
        <script src="./js/home/menuBar.js"></script>
</body>

</html>
